name: Engineering Harness

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

jobs:
  harness:
    name: Lint, docs, architecture, tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint (harness scripts)
        run: npm run lint:harness

      - name: Harness validation
        run: npm run harness:validate

      - name: Run full test suite
        run: npm test -- --run
